services:
  app:
    build: .
    volumes:
      - ./backend:/app/backend
      - ./frontend:/app/frontend
      - ./tests:/app/tests
      - model_cache:/app/data/models
      - content_data:/app/data/content
    network_mode: host
    environment:
      - OLLAMA_HOST=http://127.0.0.1:11434
      - HF_TOKEN=${HF_TOKEN:-}
      - CIVITAI_PROXY=${CIVITAI_PROXY:-}
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  ollama:
    image: ollama/ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

volumes:
  model_cache:
  content_data:
  ollama_data:
